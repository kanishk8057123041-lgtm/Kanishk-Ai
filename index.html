<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanishk AI</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background-color: #4CAF50; color: white; padding: 1em; text-align: center; }
        .sidebar { height: 100vh; background-color: #f4f4f4; padding: 15px; }  /* Adjusted for mobile */
        .chat-area { padding: 15px; }
        button { margin-top: 10px; }
    </style>
</head>
<body>
    <header>
        <h1>Kanishk AI</h1>
    </header>
    <div class="sidebar">
        <h2>Personal Information</h2>
        <p>Father: Mr. Ranu Singh</p>
        <p>Address: India UP Bijnor Halduar</p>
        <p>School: Class 8 2025-2026</p>
        <p>Teachers: Mrs. Pratima Rastogi Ji and Mr. Prashant Ji</p>
        <p>Contact: 8279474363</p>
        <button onclick="location.href='https://www.youtube.com/@WithKanishk'">YouTube Channel</button>
    </div>
    <div class="chat-area">
        <h2>Chat Area</h2>
        <input type="text" id="messageInput" placeholder="Type your message here" />
        <button id="sendButton">Send</button>
        <div id="responses"></div>
    </div>
    <script>
        document.getElementById('sendButton').addEventListener('click', function() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (message) {
                const responsesDiv = document.getElementById('responses');
                responsesDiv.innerHTML += '<p>' + message + '</p>';
                input.value = '';
            }
        });
    </script>
</body>
</html>
